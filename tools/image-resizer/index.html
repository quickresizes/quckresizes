<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Resizer | QuickResizes</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --surface: #ffffff;
        --surface-border: #e5e9f2;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
        --radius: 18px;
        --space-2: clamp(1rem, 2vw, 1.25rem);
        --space-3: clamp(1.25rem, 2.8vw, 1.75rem);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, #f8faff 0%, var(--bg) 100%);
        min-height: 100vh;
      }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 10;
        width: 100%;
        border-bottom: 1px solid rgba(229, 233, 242, 0.85);
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(8px);
      }

      .header-inner {
        max-width: 1080px;
        margin: 0 auto;
        width: min(100%, 1080px);
        padding: 1rem clamp(1rem, 2.5vw, 1.5rem);
      }

      .brand {
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      main {
        display: grid;
        place-items: center;
        min-height: calc(100vh - 72px);
        width: 100%;
        padding: clamp(1rem, 3vw, 2.25rem) clamp(0.9rem, 3vw, 1.4rem) clamp(1.5rem, 4vw, 3rem);
      }

      .resizer-card {
        width: min(100%, 760px);
        background: var(--surface);
        border: 1px solid var(--surface-border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: clamp(1.1rem, 3vw, 2rem);
      }

      .resizer-card h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.4rem, 2.5vw, 1.8rem);
      }

      .subtext {
        margin: 0 0 var(--space-3);
        color: var(--muted);
        font-size: clamp(0.92rem, 1.8vw, 1rem);
        line-height: 1.55;
        max-width: 62ch;
      }

      .form-grid {
        display: grid;
        gap: var(--space-2);
      }

      .dimensions {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      label {
        display: block;
        margin-bottom: 0.45rem;
        font-size: clamp(0.88rem, 1.6vw, 0.93rem);
        font-weight: 600;
      }

      input[type="file"],
      input[type="number"] {
        width: 100%;
        border: 1px solid #d6dbe8;
        border-radius: 10px;
        background: #fff;
        color: var(--text);
        min-height: 44px;
        padding: 0.72rem 0.82rem;
        font-size: clamp(0.92rem, 1.8vw, 0.98rem);
      }

      input[type="file"] {
        padding: 0.52rem 0.65rem;
      }

      input:focus-visible,
      button:focus-visible {
        outline: 3px solid rgba(37, 99, 235, 0.22);
        outline-offset: 1px;
      }

      .button-row {
        margin-top: 0.25rem;
      }

      .resize-btn {
        border: 0;
        border-radius: 10px;
        background: var(--primary);
        color: #fff;
        font-weight: 600;
        font-size: clamp(0.92rem, 1.8vw, 0.98rem);
        padding: 0.8rem 1rem;
        min-height: 46px;
        width: 100%;
        cursor: pointer;
        transition: background-color 0.18s ease;
      }

      .resize-btn:hover {
        background: var(--primary-hover);
      }

      .preview-area {
        margin-top: var(--space-3);
        border: 1px dashed #cbd5e1;
        border-radius: 12px;
        background: #f9fbff;
        min-height: clamp(190px, 36vh, 280px);
        display: grid;
        place-items: center;
        padding: var(--space-2);
        overflow: hidden;
      }

      .preview-content {
        width: 100%;
      }

      .preview-placeholder {
        text-align: center;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .preview-image {
        max-width: 100%;
        max-height: min(360px, 50vh);
        object-fit: contain;
        border-radius: 8px;
      }

      .preview-image.clickable {
        cursor: zoom-in;
      }

      .preview-grid {
        display: grid;
        gap: var(--space-2);
      }

      .preview-label {
        margin: 0 0 0.6rem;
        font-size: 0.9rem;
        font-weight: 600;
        color: #374151;
      }

      .details-box {
        margin-top: 0.7rem;
        border: 1px solid #dbe5f5;
        border-radius: 10px;
        background: #ffffff;
        padding: 0.7rem 0.8rem;
        font-size: 0.87rem;
      }

      .details-box[hidden] {
        display: none;
      }

      .details-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 0.38rem;
      }

      .details-list li {
        color: #334155;
        display: flex;
        justify-content: space-between;
        gap: 0.5rem;
      }

      .details-key {
        color: #64748b;
      }

      .download-btn {
        border: 1px solid #bfdbfe;
        border-radius: 10px;
        background: #eff6ff;
        color: #1d4ed8;
        font-weight: 600;
        font-size: clamp(0.9rem, 1.8vw, 0.96rem);
        padding: 0.72rem 1rem;
        min-height: 44px;
        width: 100%;
        cursor: pointer;
      }

      .download-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.8);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        z-index: 50;
      }

      .modal-overlay.show {
        display: flex;
      }

      .modal-content {
        width: min(95vw, 1000px);
        max-height: 95vh;
        background: #0f172a;
        border-radius: 12px;
        padding: 0.75rem;
        position: relative;
      }

      .modal-close {
        position: absolute;
        top: 0.45rem;
        right: 0.45rem;
        border: 0;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.95);
        color: #0f172a;
        font-weight: 700;
        min-height: 36px;
        min-width: 36px;
        cursor: pointer;
      }

      .modal-image {
        width: 100%;
        max-height: calc(95vh - 1.5rem);
        object-fit: contain;
        border-radius: 8px;
      }

      @media (max-width: 600px) {
        body {
          font-size: 15px;
        }

        .dimensions {
          grid-template-columns: 1fr;
        }

        main {
          padding-top: 1rem;
        }

        .resizer-card {
          border-radius: 14px;
          box-shadow: 0 10px 24px rgba(15, 23, 42, 0.07);
        }

        .preview-area {
          min-height: 180px;
        }

        .details-list li {
          flex-direction: column;
          gap: 0.15rem;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <div class="brand">QuickResizes</div>
      </div>
    </header>

    <main>
      <section class="resizer-card" aria-labelledby="resizer-heading">
        <h1 id="resizer-heading">Image Resizer</h1>
        <p class="subtext">Upload an image, set custom dimensions, and prepare it for resizing.</p>

        <form class="form-grid" action="#" method="post">
          <div>
            <label for="imageUpload">Upload image</label>
            <input id="imageUpload" name="imageUpload" type="file" accept="image/*" />
          </div>

          <div class="dimensions">
            <div>
              <label for="width">Width (px)</label>
              <input id="width" name="width" type="number" min="1" placeholder="e.g. 1200" />
            </div>
            <div>
              <label for="height">Height (px)</label>
              <input id="height" name="height" type="number" min="1" placeholder="e.g. 800" />
            </div>
          </div>

          <div class="button-row">
            <button class="resize-btn" type="button">Resize Image</button>
          </div>
        </form>

        <div class="preview-grid" aria-live="polite">
          <div class="preview-area">
            <div class="preview-content">
              <p class="preview-label">Original Image</p>
              <p class="preview-placeholder">Image preview will appear here</p>
              <img class="preview-image original-preview" alt="Uploaded image preview" hidden />
              <div class="details-box original-details" hidden>
                <ul class="details-list">
                  <li><span class="details-key">File Name</span><span class="detail-value original-name"></span></li>
                  <li><span class="details-key">Dimensions</span><span class="detail-value original-dimensions"></span></li>
                  <li><span class="details-key">File Size</span><span class="detail-value original-size"></span></li>
                </ul>
              </div>
            </div>
          </div>

          <div class="preview-area">
            <div class="preview-content">
              <p class="preview-label">Resized Image</p>
              <p class="preview-placeholder resized-placeholder">Resized image preview will appear here</p>
              <img class="preview-image resized-preview" alt="Resized image preview" hidden />
              <div class="details-box resized-details" hidden>
                <ul class="details-list">
                  <li><span class="details-key">Dimensions</span><span class="detail-value resized-dimensions"></span></li>
                  <li><span class="details-key">File Size</span><span class="detail-value resized-size"></span></li>
                </ul>
              </div>
            </div>
          </div>

          <div class="button-row">
            <button class="download-btn" type="button" disabled>Download Image</button>
          </div>
        </div>
      </section>
    </main>

    <div class="modal-overlay" role="dialog" aria-modal="true" aria-label="Image preview modal" hidden>
      <div class="modal-content">
        <button class="modal-close" type="button" aria-label="Close preview">×</button>
        <img class="modal-image" alt="Enlarged preview" />
      </div>
    </div>

    <script>
      const fileInput = document.getElementById("imageUpload");
      const widthInput = document.getElementById("width");
      const heightInput = document.getElementById("height");
      const resizeButton = document.querySelector(".resize-btn");
      const downloadButton = document.querySelector(".download-btn");
      const originalPreview = document.querySelector(".original-preview");
      const resizedPreview = document.querySelector(".resized-preview");
      const originalPlaceholder = document.querySelector(".preview-placeholder");
      const resizedPlaceholder = document.querySelector(".resized-placeholder");
      const originalDetails = document.querySelector(".original-details");
      const resizedDetails = document.querySelector(".resized-details");
      const originalName = document.querySelector(".original-name");
      const originalDimensions = document.querySelector(".original-dimensions");
      const originalSize = document.querySelector(".original-size");
      const resizedDimensions = document.querySelector(".resized-dimensions");
      const resizedSize = document.querySelector(".resized-size");
      const modalOverlay = document.querySelector(".modal-overlay");
      const modalImage = document.querySelector(".modal-image");
      const modalCloseButton = document.querySelector(".modal-close");

      let currentFileUrl = "";
      let resizedImageUrl = "";
      let resizedMimeType = "image/png";
      let originalMeta = null;

      function formatFileSize(bytes) {
        if (!Number.isFinite(bytes) || bytes <= 0) {
          return "0 KB";
        }

        if (bytes >= 1024 * 1024) {
          return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
        }

        return `${(bytes / 1024).toFixed(2)} KB`;
      }

      function showOriginalDetails(file, width, height) {
        originalName.textContent = file.name;
        originalDimensions.textContent = `${width} × ${height} px`;
        originalSize.textContent = formatFileSize(file.size);
        originalDetails.hidden = false;
      }

      function hideOriginalDetails() {
        originalDetails.hidden = true;
        originalName.textContent = "";
        originalDimensions.textContent = "";
        originalSize.textContent = "";
      }

      function showResizedDetails(width, height, sizeBytes) {
        resizedDimensions.textContent = `${width} × ${height} px`;
        resizedSize.textContent = formatFileSize(sizeBytes);
        resizedDetails.hidden = false;
      }

      function hideResizedDetails() {
        resizedDetails.hidden = true;
        resizedDimensions.textContent = "";
        resizedSize.textContent = "";
      }

      function clearResizedPreview() {
        if (resizedImageUrl) {
          URL.revokeObjectURL(resizedImageUrl);
          resizedImageUrl = "";
        }

        resizedPreview.hidden = true;
        resizedPreview.removeAttribute("src");
        resizedPreview.classList.remove("clickable");
        resizedPlaceholder.hidden = false;
        downloadButton.disabled = true;
        hideResizedDetails();
      }

      function openModal(imageSrc, imageAlt) {
        if (!imageSrc) {
          return;
        }

        modalImage.src = imageSrc;
        modalImage.alt = imageAlt;
        modalOverlay.hidden = false;
        modalOverlay.classList.add("show");
        modalCloseButton.focus();
      }

      function closeModal() {
        modalOverlay.hidden = true;
        modalOverlay.classList.remove("show");
        modalImage.removeAttribute("src");
      }

      function parseDimension(value, fallback) {
        const parsed = Number.parseInt(value, 10);
        return Number.isFinite(parsed) && parsed > 0 ? parsed : fallback;
      }

      fileInput.addEventListener("change", (event) => {
        const [file] = event.target.files;

        if (currentFileUrl) {
          URL.revokeObjectURL(currentFileUrl);
          currentFileUrl = "";
        }

        if (!file) {
          originalMeta = null;
          originalPreview.hidden = true;
          originalPreview.removeAttribute("src");
          originalPreview.classList.remove("clickable");
          originalPlaceholder.hidden = false;
          hideOriginalDetails();
          clearResizedPreview();
          return;
        }

        currentFileUrl = URL.createObjectURL(file);
        originalPreview.src = currentFileUrl;
        originalPreview.hidden = false;
        originalPreview.classList.add("clickable");
        originalPlaceholder.hidden = true;
        clearResizedPreview();

        const image = new Image();
        image.onload = () => {
          originalMeta = { width: image.naturalWidth, height: image.naturalHeight };
          widthInput.value = image.naturalWidth;
          heightInput.value = image.naturalHeight;
          showOriginalDetails(file, image.naturalWidth, image.naturalHeight);
          URL.revokeObjectURL(image.src);
        };

        image.src = URL.createObjectURL(file);
      });

      resizeButton.addEventListener("click", () => {
        const [file] = fileInput.files;

        if (!file || !originalMeta) {
          return;
        }

        const width = parseDimension(widthInput.value, originalMeta.width);
        const height = parseDimension(heightInput.value, originalMeta.height);

        widthInput.value = width;
        heightInput.value = height;

        const image = new Image();
        const sourceUrl = URL.createObjectURL(file);

        image.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;

          const context = canvas.getContext("2d");
          context.drawImage(image, 0, 0, width, height);

          resizedMimeType = file.type || "image/png";

          canvas.toBlob((blob) => {
            URL.revokeObjectURL(sourceUrl);

            if (!blob) {
              return;
            }

            if (resizedImageUrl) {
              URL.revokeObjectURL(resizedImageUrl);
            }

            resizedImageUrl = URL.createObjectURL(blob);
            resizedPreview.src = resizedImageUrl;
            resizedPreview.hidden = false;
            resizedPreview.classList.add("clickable");
            resizedPlaceholder.hidden = true;
            downloadButton.disabled = false;
            showResizedDetails(width, height, blob.size);
          }, resizedMimeType);
        };

        image.src = sourceUrl;
      });

      downloadButton.addEventListener("click", () => {
        if (!resizedImageUrl) {
          return;
        }

        const link = document.createElement("a");
        const [file] = fileInput.files;
        const originalNameValue = file?.name ? file.name.replace(/\.[^/.]+$/, "") : "resized-image";

        const extension = resizedMimeType === "image/jpeg" ? "jpg" : "png";

        link.href = resizedImageUrl;
        link.download = `${originalNameValue}-${widthInput.value || "custom"}x${heightInput.value || "custom"}.${extension}`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      });

      originalPreview.addEventListener("click", () => {
        if (!originalPreview.hidden) {
          openModal(originalPreview.src, "Enlarged original image preview");
        }
      });

      resizedPreview.addEventListener("click", () => {
        if (!resizedPreview.hidden) {
          openModal(resizedPreview.src, "Enlarged resized image preview");
        }
      });

      modalCloseButton.addEventListener("click", closeModal);

      modalOverlay.addEventListener("click", (event) => {
        if (event.target === modalOverlay) {
          closeModal();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !modalOverlay.hidden) {
          closeModal();
        }
      });
    </script>
  </body>
</html>
